[colors]
;catpuccin palette
;https://catppuccin.com/palette
background = #1E1E2E
background-alt = #585b70
foreground = #C5C8C6
primary = #cdd6f4
secondary = #ff0000
alert = #A54242
disabled = #707880

; Kinda green
bat_charging = #a6e3a1

; Kinda red
red_alert = #f38ba8

; Kinda blue
border-emphasis = #89b4fa

[bar/example]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

; offsets the entire bar from the top of the screen
offset-y = 5

; padding for the bar, left and right
padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; fonts
; To tweak font offset, add an integer at the end of the line. e.g.
; font-0 = JetBrainsMono:size=10:weight=bold;1
; positive is for offset in the -y direction.
; negative is for offset in the +y direction.
font-0 = JetBrainsMono:size=10:weight=bold;
font-1 = Font Awesome 6 Free Regular:style=Regular:
font-2 = Font Awesome 6 Free Solid:style=Solid:
font-3 = Font Awesome 6 Brands Regular:style=Regular:
modules-left = xworkspaces
modules-center = cpu memory
modules-right = systray pulseaudio wlan battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.border-emphasis}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.red_alert}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-connected-foreground = ${colors.bat_charging}
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.red_alert}
label-disconnected = %{F#F0C674}%ifname%%{F#f38ba8} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
label-active-underline = %{colors.border-emphasis}

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M
date-alt = %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/battery]
; charging
label-charging = %percentage%%
format-charging = <label-charging>
format-charging-foreground = ${colors.bat_charging}

;full
format-full-prefix = ÔČÄ
format-full-prefix-foreground = ${colors.bat_charging}
format-full-prefix-padding-top = 10
label-full = %percentage%%
label-full-foreground = ${colors.bat_charging}

;discharging
format-discharging-prefix = ÔČÄ
format-discharging-foreground = ${colors.primary}

type = internal/battery
full-at = 98
low-at = 5
battery = BAT1
adapter = ACAD
poll-interval = 5

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
